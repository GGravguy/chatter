<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatter Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:linear-gradient(135deg,#0f0f1a,#1f1f2e);
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* Sidebar */

#sidebar{
width:260px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

#rooms{
flex:1;
overflow:auto;
}

.room{
padding:12px;
border-radius:10px;
cursor:pointer;
transition:0.25s ease;
}

.room:hover{
background:rgba(255,255,255,0.12);
}

.active{
background:#4da6ff;
}

/* Chat */

#chat{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
padding:20px;
overflow-y:auto;
scroll-behavior:smooth;
}

.message{
background:rgba(255,255,255,0.08);
padding:10px 15px;
border-radius:12px;
margin-bottom:10px;
animation:fadeIn .25s ease;
}

.username{
color:#4da6ff;
font-weight:bold;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* Input */

#inputArea{
display:flex;
border-top:1px solid rgba(255,255,255,0.1);
}

#msgInput{
flex:1;
padding:16px;
border:none;
background:none;
color:white;
outline:none;
font-size:16px;
}

#send{
padding:0 22px;
border:none;
background:#4da6ff;
color:white;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<div id="sidebar">
<h3>Rooms</h3>
<div id="rooms"></div>
<button id="createRoom">+ Create Room</button>
</div>

<div id="chat">
<div id="messages"></div>
<div id="typing"></div>

<div id="inputArea">
<input id="msgInput" placeholder="Type message...">
<button id="send">Send</button>
</div>
</div>

<script>

const supabase = supabase_js.createClient(
"https://aaftyaykokqpypdekinz.supabase.co",
"PASTE_YOUR_ANON_KEY"
);

/* Username Modal (FIXED PROMPT BUG) */

let username="";

function askUsername(){
username = prompt("Enter username:");

if(!username){
username="User"+Math.floor(Math.random()*9999);
}
}

askUsername();

/* Chat State */

let currentRoom="general";
let typingTimeout;

/* Elements */

const roomsDiv=document.getElementById("rooms");
const messagesDiv=document.getElementById("messages");
const input=document.getElementById("msgInput");
const typingDiv=document.getElementById("typing");

/* Load Rooms */

async function loadRooms(){

const {data}=await supabase.from("rooms").select("*");

roomsDiv.innerHTML="";

data.forEach(r=>{
const div=document.createElement("div");

div.className="room"+(r.name===currentRoom?" active":"");
div.innerText=r.name;

div.onclick=()=>switchRoom(r.name);

roomsDiv.appendChild(div);
});

}

/* Switch Room */

function switchRoom(room){

currentRoom=room;
messagesDiv.innerHTML="";
loadMessages();
loadRooms();

}

/* Load Messages */

async function loadMessages(){

const {data}=await supabase
.from("messages")
.select("*")
.eq("room",currentRoom)
.order("created_at",{ascending:true});

messagesDiv.innerHTML="";

data.forEach(m=>{
if(!m.typing){
addMessage(m.username,m.text);
}
});

}

/* Add Message */

function addMessage(user,text){

const div=document.createElement("div");
div.className="message";
div.innerHTML=`<span class="username">${user}:</span> ${text}`;

messagesDiv.appendChild(div);
messagesDiv.scrollTop=messagesDiv.scrollHeight;

}

/* Send Message */

async function sendMessage(){

if(!input.value.trim()) return;

await supabase.from("messages").insert({
room:currentRoom,
username:username,
text:input.value
});

input.value="";

}

/* Typing Indicator */

input.addEventListener("input",async()=>{

await supabase.from("messages").insert({
room:currentRoom,
username:username,
text:"",
typing:true
});

clearTimeout(typingTimeout);

typingTimeout=setTimeout(()=>{
typingDiv.innerHTML="";
},1000);

});

/* Realtime Listener */

function listenRealtime(){

supabase.channel("chat")
.on("postgres_changes",
{event:"INSERT",schema:"public",table:"messages"},
payload=>{

const m=payload.new;

if(m.room!==currentRoom) return;

if(m.typing){
typingDiv.innerHTML=`<i>${m.username} is typing...</i>`;
return;
}

addMessage(m.username,m.text);

})
.subscribe();

}

/* Room Creation */

document.getElementById("createRoom").onclick=async()=>{

const name=prompt("Room name:");

if(!name) return;

await supabase.from("rooms").insert({
name:name
});

loadRooms();

};

/* Buttons */

document.getElementById("send").onclick=sendMessage;

input.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage();
});

/* Start */

loadRooms();
loadMessages();
listenRealtime();

</script>

</body>
</html>
