<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatter! Chat App</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
 margin:0;
 font-family:Segoe UI;
 background: linear-gradient(135deg,#0f0f1a,#1f1f2e);
 color:white;
 display:flex;
 height:100vh;
 overflow:hidden;
}

#sidebar{
 width:260px;
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(20px);
 padding:20px;
 display:flex;
 flex-direction:column;
}

#rooms{flex:1;overflow:auto;}
.room{
 padding:10px;
 border-radius:8px;
 cursor:pointer;
 margin-bottom:5px;
 transition:.2s;
}
.room:hover{background:rgba(255,255,255,.1);}
.active{background:#4da6ff;}

#createRoom{
 padding:10px;
 border:none;
 background:#4da6ff;
 color:white;
 border-radius:8px;
 cursor:pointer;
}

#chat{flex:1;display:flex;flex-direction:column;}
#messages{flex:1;padding:20px;overflow:auto;}
.message{
 background:rgba(255,255,255,.08);
 padding:10px 15px;
 border-radius:10px;
 margin-bottom:10px;
 animation:fade .2s ease;
}
.username{color:#4da6ff;font-weight:bold;}
.typing{font-style:italic;color:#00ffc3;margin-left:20px;}

@keyframes fade{
 from{opacity:0;transform:translateY(10px);}
 to{opacity:1;transform:translateY(0);}
}

#inputArea{display:flex;border-top:1px solid rgba(255,255,255,.1);}
#msgInput{
 flex:1;
 padding:15px;
 background:none;
 border:none;
 color:white;
 font-size:16px;
 outline:none;
}
#send{
 padding:15px 20px;
 border:none;
 background:#4da6ff;
 color:white;
 cursor:pointer;
}
</style>
</head>

<body>

<div id="sidebar">
 <h3>Rooms</h3>
 <div id="rooms"></div>
 <button id="createRoom">+ Create Room</button>
</div>

<div id="chat">
 <div id="messages"></div>
 <div id="typingIndicator"></div>
 <div id="inputArea">
   <input id="msgInput" placeholder="Type a message...">
   <button id="send">Send</button>
 </div>
</div>

<script>
const supabase = window.supabase.createClient(
 "https://aaftyaykokqpypdekinz.supabase.co",
 "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhZnR5YXlrb2txcHlwZGVraW56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Njg1MTgsImV4cCI6MjA4ODA0NDUxOH0.j6wLPXE6cdDc2uTVMKKTvtO1suz9K085YGIybd8q790"
);

let username = prompt("Enter username:");
if(!username) username = "User" + Math.floor(Math.random()*1000);

let currentRoom = "general";
let rooms = ["general"];
let typingTimeout;

const roomsDiv = document.getElementById("rooms");
const messagesDiv = document.getElementById("messages");
const typingDiv = document.getElementById("typingIndicator");
const input = document.getElementById("msgInput");

function renderRooms(){
 roomsDiv.innerHTML = "";
 rooms.forEach(r=>{
   const div = document.createElement("div");
   div.className = "room" + (r === currentRoom ? " active" : "");
   div.textContent = r;
   div.onclick = () => switchRoom(r);
   roomsDiv.appendChild(div);
 });
}

function switchRoom(room){
 currentRoom = room;
 messagesDiv.innerHTML = "";
 loadMessages();
 renderRooms();
}

async function loadMessages(){
 const { data } = await supabase
   .from("messages")
   .select("*")
   .eq("room", currentRoom)
   .order("created_at",{ascending:true});

 messagesDiv.innerHTML = "";
 data.forEach(m => addMessage(m.username, m.text));
}

function addMessage(user, text){
 const div = document.createElement("div");
 div.className = "message";
 div.innerHTML = `<span class="username">${user}:</span> ${text}`;
 messagesDiv.appendChild(div);
 messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

document.getElementById("send").onclick = async () => {
 if (!input.value.trim()) return;

 await supabase.from("messages").insert({
   room: currentRoom,
   username: username,
   text: input.value
 });

 input.value = "";
 typingDiv.innerHTML = "";
};

input.addEventListener("input", () => {
 typingDiv.innerHTML = `<div class="typing">${username} is typing...</div>`;
 clearTimeout(typingTimeout);
 typingTimeout = setTimeout(() => {
   typingDiv.innerHTML = "";
 }, 1200);
});

document.getElementById("createRoom").onclick = () => {
 const name = prompt("Room name:");
 if (name && !rooms.includes(name)) {
   rooms.push(name);
   renderRooms();
 }
};

supabase
 .channel("realtime")
 .on("postgres_changes", {
   event: "INSERT",
   schema: "public",
   table: "messages"
 }, payload => {
   if (payload.new.room === currentRoom) {
     addMessage(payload.new.username, payload.new.text);
   }
 })
 .subscribe();

renderRooms();
loadMessages();
</script>

</body>
</html>
