<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f0f1a;
color:white;
display:flex;
height:100vh;
}

#sidebar{
width:260px;
background:rgba(255,255,255,0.05);
padding:20px;
display:flex;
flex-direction:column;
}

.room{
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:5px;
transition:.2s;
}

.room:hover{
background:rgba(255,255,255,.1);
}

.active{
background:#4da6ff;
}

#chat{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
padding:20px;
overflow-y:auto;
scroll-behavior:smooth;
}

.message{
background:rgba(255,255,255,0.07);
padding:10px;
border-radius:10px;
margin-bottom:8px;
}

.username{
color:#4da6ff;
font-weight:bold;
}

#inputArea{
display:flex;
border-top:1px solid rgba(255,255,255,0.1);
}

#msgInput{
flex:1;
padding:15px;
background:none;
border:none;
color:white;
outline:none;
}

#send{
padding:0 25px;
background:#4da6ff;
border:none;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="sidebar">
<h3>Rooms</h3>
<div id="rooms"></div>
<button id="newRoomBtn">+ Create Room</button>
</div>

<div id="chat">
<div id="messages"></div>
<div id="typing"></div>

<div id="inputArea">
<input id="msgInput" placeholder="Message...">
<button id="send">Send</button>
</div>
</div>

<script>

const supabase = supabase_js.createClient(
"https://aaftyaykokqpypdekinz.supabase.co",
"PASTE_ANON_KEY"
);

/* Username */

let username=prompt("Enter username");
if(!username) username="User"+Math.floor(Math.random()*9999);

/* State */

let currentRoom="general";

/* Elements */

const roomsDiv=document.getElementById("rooms");
const messagesDiv=document.getElementById("messages");
const input=document.getElementById("msgInput");

/* Load Rooms */

async function loadRooms(){

const {data}=await supabase.from("rooms").select("*");

roomsDiv.innerHTML="";

data.forEach(r=>{
const div=document.createElement("div");
div.className="room"+(r.name===currentRoom?" active":"");
div.innerText=r.name;

div.onclick=()=>switchRoom(r.name);

roomsDiv.appendChild(div);
});

}

/* Switch Room */

function switchRoom(room){
currentRoom=room;
messagesDiv.innerHTML="";
loadMessages();
loadRooms();
}

/* Load Messages */

async function loadMessages(){

const {data}=await supabase
.from("messages")
.select("*")
.eq("room",currentRoom)
.order("created_at",{ascending:true});

messagesDiv.innerHTML="";

data.forEach(m=>{
if(!m.typing){
messagesDiv.innerHTML+=`<div class="message"><span class="username">${m.username}:</span> ${m.content}</div>`;
}
});

messagesDiv.scrollTop=messagesDiv.scrollHeight;
}

/* Send Message */

async function sendMessage(){

if(!input.value.trim()) return;

await supabase.from("messages").insert({
room:currentRoom,
username:username,
content:input.value
});

input.value="";
}

/* Realtime */

supabase.channel("chat")
.on("postgres_changes",
{event:"INSERT",schema:"public",table:"messages"},
payload=>{

const m=payload.new;

if(m.room!==currentRoom) return;

if(m.typing) return;

messagesDiv.innerHTML+=
`<div class="message"><span class="username">${m.username}:</span> ${m.content}</div>`;

messagesDiv.scrollTop=messagesDiv.scrollHeight;

})
.subscribe();

/* Room Creation */

document.getElementById("newRoomBtn").onclick=async()=>{

const name=prompt("Room name");

if(!name) return;

await supabase.from("rooms").insert({name});

loadRooms();

};

/* Buttons */

document.getElementById("send").onclick=sendMessage;

input.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage();
});

/* Start */

loadRooms();
loadMessages();

</script>

</body>
</html>
