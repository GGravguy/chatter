<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Rooms Chat</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    overflow: hidden;
}

#sidebar {
    width: 250px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(15px);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-right: 1px solid rgba(255,255,255,0.1);
}

#rooms {
    flex: 1;
    overflow-y: auto;
}

.room {
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.room:hover {
    background: rgba(255,255,255,0.1);
}

.active-room {
    background: rgba(77,166,255,0.3);
}

#createRoomBtn {
    padding: 10px;
    border: none;
    background: #4da6ff;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

#createRoomBtn:hover {
    background: #3399ff;
}

#chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.message {
    margin-bottom: 10px;
    padding: 10px 15px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    animation: fadeIn 0.3s ease;
}

.username {
    font-weight: bold;
    color: #4da6ff;
}

.system {
    font-style: italic;
    color: #00ffc3;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

#input-area {
    display: flex;
    border-top: 1px solid rgba(255,255,255,0.1);
}

#messageInput {
    flex: 1;
    padding: 15px;
    background: transparent;
    border: none;
    color: white;
    font-size: 16px;
    outline: none;
}

#sendBtn {
    padding: 15px 20px;
    border: none;
    background: #4da6ff;
    cursor: pointer;
    transition: 0.3s;
}

#sendBtn:hover {
    background: #3399ff;
}
</style>
</head>

<body>

<div id="sidebar">
    <h3>Rooms</h3>
    <div id="rooms"></div>
    <button id="createRoomBtn">+ Create Room</button>
</div>

<div id="chat-container">
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="messageInput" placeholder="Type message...">
        <button id="sendBtn">Send</button>
    </div>
</div>

<script>
let username = prompt("Enter username:");
if (!username) username = "User" + Math.floor(Math.random()*1000);

let currentRoom = "general";
let rooms = ["general"];

const ws = new WebSocket("wss://ws.postman-echo.com/raw");

const roomsDiv = document.getElementById("rooms");
const messagesDiv = document.getElementById("messages");
const input = document.getElementById("messageInput");

function renderRooms() {
    roomsDiv.innerHTML = "";
    rooms.forEach(room => {
        const div = document.createElement("div");
        div.className = "room" + (room === currentRoom ? " active-room" : "");
        div.textContent = room;
        div.onclick = () => switchRoom(room);
        roomsDiv.appendChild(div);
    });
}

function switchRoom(room) {
    currentRoom = room;
    messagesDiv.innerHTML = "";
    renderRooms();
    addSystemMessage("Joined room: " + room);
}

function addMessage(user, text) {
    const div = document.createElement("div");
    div.className = "message";
    div.innerHTML = "<span class='username'>" + user + ":</span> " + text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function addSystemMessage(text) {
    const div = document.createElement("div");
    div.className = "message system";
    div.textContent = text;
    messagesDiv.appendChild(div);
}

ws.onmessage = (event) => {
    try {
        const data = JSON.parse(event.data);
        if (data.room === currentRoom) {
            addMessage(data.user, data.text);
        }
    } catch {}
};

function sendMessage() {
    if (!input.value.trim()) return;

    const data = {
        room: currentRoom,
        user: username,
        text: input.value
    };

    ws.send(JSON.stringify(data));
    input.value = "";
}

document.getElementById("sendBtn").onclick = sendMessage;

input.addEventListener("keypress", e => {
    if (e.key === "Enter") sendMessage();
});

document.getElementById("createRoomBtn").onclick = () => {
    const name = prompt("Room name:");
    if (name && !rooms.includes(name)) {
        rooms.push(name);
        renderRooms();
    }
};

renderRooms();
switchRoom("general");
</script>

</body>
</html>
